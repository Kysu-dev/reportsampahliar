name: Deploy Pantau Sampah

on:
  push:
    branches: ["main"]

jobs:
  # --- JOB 1: BUILD & DEPLOY FRONTEND ---
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fe-reportsampah:latest

      - name: SSH and Deploy to EC2 FE
        uses: appleboy/ssh-action@master
        with:
          host: 3.238.195.18
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/fe-reportsampah:latest
            docker stop fe-app || true
            docker rm fe-app || true
            docker run -d --name fe-app -p 3000:3000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/fe-reportsampah:latest