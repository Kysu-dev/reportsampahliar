name: Deploy Pantau Sampah

on:
  push:
    branches: [ "main" ] # Ganti ke 'master' kalau branch utama kamu namanya master

jobs:
  # --- JOB 1: BUILD & PUSH KE DOCKER HUB ---
  # Bagian ini dikerjakan oleh server GitHub (ubuntu-latest)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend # Pastikan ini folder frontend di project kamu
          file: ./frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fe-reportsampah:latest

  # --- JOB 2: DEPLOY KE EC2 ---
  # Bagian ini dikerjakan langsung oleh EC2 kamu (lewat Runner)
  deploy-frontend:
    needs: build-frontend # Tunggu build selesai baru deploy
    runs-on: self-hosted   # Ini memanggil 'frontend-runner' yang sudah hijau di GitHub
    steps:
      - name: Pull and Run Container
        run: |
          # Ambil image terbaru dari Docker Hub
          docker pull ${{ secrets.DOCKER_USERNAME }}/fe-reportsampah:latest
          
          # Hentikan container lama kalau ada
          docker stop fe-app || true
          docker rm fe-app || true
          
          # Jalankan container baru
          docker run -d \
            --name fe-app \
            -p 80:80 \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/fe-reportsampah:latest
            
      - name: Cleanup Old Images
        run: docker image prune -f # Biar disk EC2 kamu gak penuh sama sampah image lama

  # --- JOB 3: BUILD & PUSH BACKEND ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image (with retry)
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/be-reportsampah:latest
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1

          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Build backend attempt ${attempt}/${max_attempts}..."

            if docker buildx build \
              --file ./backend/Dockerfile \
              --tag "$IMAGE_NAME" \
              --push \
              ./backend; then
              echo "Build and push backend succeeded."
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build and push backend failed after ${max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Transient error detected, retrying in ${sleep_seconds} seconds..."
            sleep "$sleep_seconds"

            attempt=$((attempt + 1))
          done

  # --- JOB 4: DEPLOY KE EC2 BACKEND ---
  deploy-backend:
    needs: build-backend
    runs-on: self-hosted-backend # Sesuaikan dengan label yang kamu buat tadi
    steps:
      - name: Pull and Run Backend
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/be-reportsampah:latest
          docker stop be-app || true
          docker rm be-app || true

          # Kita arahkan ke file .env yang ada di home directory ubuntu
          docker run -d \
            --name be-app \
            -p 3000:8080 \
            --env-file /home/ubuntu/.env \
            ${{ secrets.DOCKER_USERNAME }}/be-reportsampah:latest

          docker image prune -f