server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/auth/ {
    # Kompatibilitas jika frontend masih mengirim /api/auth/login.
    rewrite ^/api/auth/(.*)$ /auth/$1 break;
    proxy_pass http://10.1.3.75:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /api/ {
    # Jangan gunakan trailing slash agar prefix /api tetap diteruskan ke backend.
    proxy_pass http://10.1.3.75:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /auth/ {
    proxy_pass http://10.1.3.75:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location / {
    # Prioritaskan file route export (.html), lalu fallback ke landing untuk route tak dikenal.
    try_files $uri $uri.html /index.html;
  }
}